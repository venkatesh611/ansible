- name: installing  uninstalling  packages
  hosts: local
  connection: local
  become: yes
  tasks: 
  - name: installing nginx uninstalling 
    ansible.builtin.package:
     name: "{{item.name}}"
     state: "{{item.state}}"
    loop:
    - { name: "nginx", state: "latest" }
    - { name: "mysql", state: "absent" }
    - { name: "zip", state: "absent"}
  