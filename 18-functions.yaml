- name: functions in ansible
  hosts: local
  connection: local
  vars:
    name: "venkat"
    gmail: "venkat@gmail.com"
    ipaddress: 128.123.12897897.6
    technologies: DevOps, Linux, Shell, Ansible # string
  # dictionary == map
    tags:
      Application: payment
      Environment: dev
    # List
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev
  tasks:
   - name: defult value for var
     ansible.builtin.debug:
      msg: "default value: {{name | default('rakesh')}}"

     # string to list
   - name: splitting strings
     ansible.builtin.debug:
      msg: " techs are {{technologies | split( ',' )}}"

   - name: dir to map
     ansible.builtin.debug:
      msg: " techs are {{tags | dict2items}}"

   - name: list to map
     ansible.builtin.debug:
      msg: " techs are {{listTags | items2dict}}"


   - name: read taml file and take it into a variable
     ansible.builtin.set_fact:
      student_yaml: "{{lookup('file','student.yaml')|from_yaml}}"
   - name: convert yaml into json
     ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json  }}"
   - name: convert yaml into json
     ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_nice_json  }}"
   - name: save json to file
     ansible.builtin.copy:
      dest: ./stundent-data.json
      content: "{{ student_yaml | to_nice_json  }}"
   - name: convert uppercase
     ansible.builtin.debug:
      msg: "{{ name | upper }}"
   - name: convert lowercase
     ansible.builtin.debug:
      msg: "{{ gmail | lower }}"
   - name: check IP is valid or not
     ansible.builtin.debug: 
      msg: "{{ ipaddress | ansible.utils.ipv4 }}"



   - name: grep for root
     #ansible.builtin.command: cat /etc/passwd | grep root
     ansible.builtin.shell: cat /etc/passwd | grep root
     register: command_output
   - name: print the command_output
     ansible.builtin.debug:
      msg: "{{ command_output }}"